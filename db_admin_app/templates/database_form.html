{% extends "base.html" %}

{% block page_title %}{% if action == 'create' %}Создание{% else %}Редактирование{% endif %} подключения{% endblock %}

{% block content %}
<div class="card">
  <div class="card__header">
    <span>{% if action == 'create' %}Создание нового подключения{% else %}Редактирование подключения{% endif %}</span>
  </div>

  <div class="card__body">
    <form method="post" class="form">
      <div class="form-group">
        <label for="name">Имя подключения *</label>
        <input type="text" id="name" name="name" value="{{ connection.name if connection else '' }}" required class="input">
      </div>

      <div class="form-group">
        <label for="db_path">Путь к файлу БД *</label>
        <input type="text" id="db_path" name="db_path" value="{{ connection.db_path if connection else '' }}" placeholder="например, data/my_db.sqlite" required class="input">
      </div>

      <div class="form-group">
        <label for="description">Описание</label>
        <textarea id="description" name="description" rows="3" class="input">{{ connection.description if connection else '' }}</textarea>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="read_only" name="read_only" value="1" {% if connection and connection.read_only %}checked{% endif %}>
          Только чтение
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('databases_list') }}" class="btn btn-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
